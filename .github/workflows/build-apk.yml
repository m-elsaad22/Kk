name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create .env file
      run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      # هنا أضفنا أوامر لمنع انهيار KSP بسبب الواجهة الرسومية والذاكرة
      run: ./gradlew assembleDebug --no-daemon -Djava.awt.headless=true -Dorg.gradle.jvmargs="-Xmx2048m"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kayan-App-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
